name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            # Every released file, in one attestation, as the community workflow
            # documents:
            # forum.obsidian.md/t/how-to-automate-artifact-attestation-for-releases/114445
            #
            # 2.0.1 briefly split this into one attestation per asset, chasing a
            # scorecard error. That was wrong: 2.0.0 failed the same check with a
            # multi-subject attestation, and 1.0.1 passed it with one, so the shape
            # was never the variable. manifest.json is attested too now, which the
            # earlier config left out.
            - name: Attest plugin artifacts
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
