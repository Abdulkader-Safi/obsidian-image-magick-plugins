name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            # One attestation per asset, rather than one covering both.
            #
            # A multi-subject attestation is valid and the GitHub CLI verifies it
            # either way, but Obsidian's scorecard reported 2.0.0's attestation as
            # failing verification for both assets, and a statement listing a
            # second file is the one difference a per-artifact check would trip
            # over. Splitting costs a step and removes the ambiguity.
            - name: Attest main.js
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: main.js

            - name: Attest styles.css
              if: steps.styles.outputs.exists == 'true'
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: styles.css

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
